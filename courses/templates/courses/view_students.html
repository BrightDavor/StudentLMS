

{% block content %}
<div class="container">
    <h2>Students Enrolled in "{{ course.title }}"</h2>

    {% if students %}
        <ul>
            {% for student in students %}
                <li>
                    <img src="{{ student.profile_picture_url }}" alt="Profile Picture" width="50" style="border-radius:50%;">
                    {{ student.username }} ({{ student.email }})
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No students enrolled yet.</p>
    {% endif %}
</div>
{% endblock %}
