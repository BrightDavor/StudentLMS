{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Message</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
        h2 { color: #333; }
        form { background: #fff; padding: 20px; border-radius: 8px; max-width: 500px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        textarea { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 8px 12px; background: #0d6efd; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
        .messages { margin-top: 30px; max-width: 500px; }
        .message { padding: 8px; border-radius: 5px; background: #f5f5f5; margin-bottom: 10px; position: relative; }
        .my-message { background-color: #d1e7dd; text-align: right; }
        .message-actions { font-size: 0.8em; margin-top: 5px; }
        .message-actions a { margin-left: 5px; color: #555; text-decoration: none; }
        .message-actions a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<h2>Edit Message</h2>

<form method="POST">
    {% csrf_token %}
    <textarea name="content" rows="4" required>{{ message.content }}</textarea><br>
    <button type="submit">Save</button>
</form>

<div class="messages">
    <h3>Chat History</h3>
    {% for msg in messages %}
        <div class="message {% if msg.sender == request.user %}my-message{% endif %}">
            <p><strong>{{ msg.sender.username }}:</strong> {{ msg.content }}</p>
            {% if msg.sender == request.user %}
                <div class="message-actions">
                    <a href="{% url 'edit-message' msg.id %}">✏️ Edit</a>
                    <a href="{% url 'delete-message' msg.id %}" onclick="return confirm('Are you sure?');">🗑 Delete</a>
                </div>
            {% endif %}
        </div>
    {% empty %}
        <p>No messages yet.</p>
    {% endfor %}
</div>

<p><a href="{% url 'private-chat' message.receiver.id %}">Back to Chat</a></p>

</body>
</html>
