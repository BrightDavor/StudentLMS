{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Private Message</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <h2>Edit Message to {{ message.receiver.username }}</h2>

    <form method="POST">
        {% csrf_token %}
        <textarea name="content" rows="4" cols="50">{{ message.content }}</textarea><br><br>
        <button type="submit">Save Changes</button>
        <a href="{% url 'private-chat' message.receiver.id %}">Cancel</a>
    </form>
</body>
</html>
