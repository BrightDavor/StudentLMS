{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Lecturer Multi-Step Login</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .registration-container {
            background: #fff;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 400px;
            max-width: 90%;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .progress-bar {
            background-color: #e0e0e0;
            border-radius: 10px;
            height: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .progress {
            background-color: #2575fc;
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .form-step {
            display: none;
        }

        .form-step-active {
            display: block;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }

        button {
            padding: 12px;
            margin-top: 10px;
            background-color: #2575fc;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 48%;
            margin-right: 4%;
        }

        button.prev-btn {
            background-color: #888;
            margin-right: 0;
        }

        button:hover {
            opacity: 0.9;
        }

        p.error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="registration-container">
    <h2>Lecturer Multi-Step Login</h2>

    <!-- Progress Bar -->
    <div class="progress-bar">
        <div class="progress" id="progress"></div>
    </div>

    <form id="lecturerForm" method="POST">
        {% csrf_token %}

        <!-- Step 1: Department -->
        <div class="form-step form-step-active">
            <input type="text" name="department" id="department" placeholder="Department Username" required>
            <button type="button" class="next-btn">Next</button>
        </div>

        <!-- Step 2: Program -->
        <div class="form-step">
            <input type="text" name="program" id="program" placeholder="Program Username" required>
            <button type="button" class="prev-btn">Previous</button>
            <button type="button" class="next-btn">Next</button>
        </div>

        <!-- Step 3: Course -->
        <div class="form-step">
            <input type="text" name="course" id="course" placeholder="Course Username" required>
            <button type="button" class="prev-btn">Previous</button>
            <button type="button" class="next-btn">Next</button>
        </div>

        <!-- Step 4: Password -->
        <div class="form-step">
            <input type="password" name="password" id="password" placeholder="Password" required>
            <button type="button" class="prev-btn">Previous</button>
            <button type="submit">Login</button>
        </div>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </form>
</div>

<script>
    const form = document.getElementById('lecturerForm');
    const nextBtns = form.querySelectorAll('.next-btn');
    const prevBtns = form.querySelectorAll('.prev-btn');
    const formSteps = form.querySelectorAll('.form-step');
    const progress = document.getElementById('progress');

    let currentStep = 0;

    function updateFormSteps() {
        formSteps.forEach((step, index) => {
            step.classList.toggle('form-step-active', index === currentStep);
        });
        progress.style.width = ((currentStep) / (formSteps.length - 1)) * 100 + '%';
    }

    nextBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            if (currentStep < formSteps.length - 1) {
                currentStep++;
                updateFormSteps();
            }
        });
    });

    prevBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            if (currentStep > 0) {
                currentStep--;
                updateFormSteps();
            }
        });
    });
</script>
</body>
</html>
