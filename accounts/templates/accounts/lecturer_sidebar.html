{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Dashboard | AdornTech LMS</title>
    <link rel="stylesheet" href="{% static 'css/sidebar_navbar.css' %}">
</head>

<body>

    <!-- Navbar -->
    <div class="navbar">
        <div class="brand">AdornTech LMS</div>
        <div class="user-info">
            <a href="{% url 'lecturer-profile' %}">
                {% if request.user.profile_picture %}
                    <img src="{{ request.user.profile_picture.url }}" 
                         alt="Profile" 
                         style="width:40px; height:40px; border-radius:50%;">
                {% else %}
                    <img src="{% static 'images/default_profile.png' %}" 
                         alt="Default Profile" 
                         style="width:40px; height:40px; border-radius:50%;">
                {% endif %}
            </a>
            <span>{{ request.user.username }}</span>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <ul>
            <li><a href="{% url 'lecturer-dashboard' %}">Dashboard</a></li>
            <li><a href="{% url 'lecturer-profile' %}">Profile</a></li>
            <li><a href="{% url 'lecturer-settings' %}">Settings</a></li>
            <li><a href="{% url 'logout' %}">Logout</a></li>
        </ul>
    </div>

    <div>
        {% block content %}{% endblock %}
    </div>

</body>
</html>
